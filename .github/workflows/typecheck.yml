name: type checks

on:
  push:
    branches:
      - develop
  workflow_dispatch:
  pull_request:
    branches:
      - develop

jobs:
  mypy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Install just
      uses: extractions/setup-just@v3

    - name: Install dependencies
      run: |
        just dev-sync

    # Gates on NEW type errors only, via the committed .mypy-baseline.txt ratchet.
    # See docs/source/internals/type_checking.md
    - name: Type check
      run: |
        just typecheck
